services:
  - type: web
    name: pricewise-backend
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
      - key: MONGO_URI
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: CLIENT_URL
        sync: false
